<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB Smart Translator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f7f6;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            padding: 10px;
            border: 2px dashed #007bff;
            border-radius: 5px;
            background: #e9f2ff;
            cursor: pointer;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active {
            background-color: #0056b3;
        }
        #copyBtn {
            background-color: #28a745;
        }
        #viewer {
            margin-top: 20px;
            background: white;
            padding: 15px;
            min-height: 400px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow-y: auto;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📖 Mobile EPUB Translator</h2>
        <p>1. Phone se Upload -> 2. Chrome Translate -> 3. Copy</p>
    </div>

    <div class="controls">
        <label for="epubFile"><b>📁 Phone Storage se EPUB File chunein:</b></label>
        <input type="file" id="epubFile" accept=".epub">
        
        <div class="buttons">
            <button id="prevBtn">⬅️ Pichla Page</button>
            <button id="nextBtn">Agla Page ➡️</button>
        </div>
        <button id="copyBtn">📋 Poora Page Copy Karein</button>
    </div>

    <div id="viewer"></div>

    <script>
        let book = null;
        let rendition = null;

        document.getElementById('epubFile').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (!file) return;

            // Agar pehle se book khuli hai toh usko hatao
            if (book) {
                book.destroy();
                document.getElementById("viewer").innerHTML = "";
            }

            // Book load karna
            let reader = new FileReader();
            reader.onload = function(event) {
                let bookData = event.target.result;
                book = ePub(bookData);
                
                rendition = book.renderTo("viewer", {
                    width: "100%",
                    height: "100%",
                    flow: "scrolled-doc" // Mobile browser ke liye best
                });

                rendition.display();
            };
            reader.readAsArrayBuffer(file);
        });

        // Next & Prev Buttons
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (rendition) rendition.prev();
        });
        
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (rendition) rendition.next();
        });

        // Copy Text Button Logic
        document.getElementById('copyBtn').addEventListener('click', async () => {
            if (!rendition) return alert("Pehle apne phone se file upload karein!");
            
            try {
                // Iframe ke andar se text nikal kar copy karna
                let iframe = document.querySelector("#viewer iframe");
                if(iframe) {
                    let text = iframe.contentDocument.body.innerText;
                    await navigator.clipboard.writeText(text);
                    alert("✅ Translated text copy ho gaya!");
                } else {
                    alert("⚠️ Text nahi mila. Thoda wait karke try karein.");
                }
            } catch (err) {
                alert("❌ Copy fail hua. Manual select karke copy karein.");
            }
        });
    </script>

</body>
</html>
