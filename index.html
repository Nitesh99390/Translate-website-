<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massive EPUB Translator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f7f6;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            padding: 10px;
            border: 2px dashed #dc3545;
            border-radius: 5px;
            background: #ffebeb;
            cursor: pointer;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            background-color: #1e7e34;
        }
        #viewer {
            margin-top: 20px;
            background: white;
            padding: 15px;
            min-height: 400px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }
        .loading {
            color: #dc3545;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🔥 Extreme EPUB Translator</h2>
        <p>⚠️ Pura book ek sath load hoga (Phone hang ho sakta hai)</p>
    </div>

    <div class="controls">
        <label for="epubFile"><b>📁 Apni EPUB File chunein:</b></label>
        <input type="file" id="epubFile" accept=".epub">
        
        <button id="copyBtn">📋 Pura Text Ek Sath Copy Karein</button>
    </div>

    <div id="viewer">📚 File upload karein aur magic dekhein...</div>

    <script>
        let book = null;

        document.getElementById('epubFile').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (!file) return;

            const viewer = document.getElementById("viewer");
            viewer.innerHTML = "<p class='loading'>⏳ Puri kitaab nikal raha hoon... Badi file mein 1-2 minute lag sakte hain, screen band mat karna!</p>";

            let reader = new FileReader();
            reader.onload = function(event) {
                let bookData = event.target.result;
                book = ePub(bookData);

                // Sare chapters ko extract karke ek page par daalna
                book.loaded.spine.then(async function() {
                    let fullHtml = "";
                    try {
                        for(let i = 0; i < book.spine.length; i++) {
                            let item = book.spine.get(i);
                            await item.load(book.load.bind(book));
                            if(item.document && item.document.body) {
                                fullHtml += item.document.body.innerHTML + "<br><hr style='border:2px solid red;'><br>";
                            }
                        }
                        viewer.innerHTML = fullHtml;
                    } catch(err) {
                        viewer.innerHTML = "<p class='loading'>❌ Error: Book itni badi hai ki browser ka memory full ho gaya.</p>";
                    }
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // Copy Text Button
        document.getElementById('copyBtn').addEventListener('click', async () => {
            const viewer = document.getElementById("viewer");
            if (viewer.innerText.includes("File upload karein") || viewer.innerText.includes("Puri kitaab nikal raha hoon")) {
                return alert("Pehle file ko poori tarah load hone do!");
            }
            
            try {
                await navigator.clipboard.writeText(viewer.innerText);
                alert("✅ Saara text copy ho gaya!");
            } catch (err) {
                alert("❌ Text bohot bada hai, mobile clipboard ne uthane se mana kar diya. Manual select karke copy karo!");
            }
        });
    </script>

</body>
</html>
