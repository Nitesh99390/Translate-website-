<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massive EPUB Translator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f7f6;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            padding: 10px;
            border: 2px dashed #007bff;
            border-radius: 5px;
            background: #e9f2ff;
            cursor: pointer;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            background-color: #1e7e34;
        }
        #viewer {
            margin-top: 20px;
            background: white;
            padding: 15px;
            min-height: 400px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }
        .loading {
            color: #dc3545;
            font-weight: bold;
            text-align: center;
        }
        .separator {
            text-align: center;
            color: #888;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🔥 Extreme EPUB to TXT</h2>
        <p>1. Upload 👉 2. Chrome Translate 👉 3. Save as TXT</p>
    </div>

    <div class="controls">
        <label for="epubFile"><b>📁 Apni EPUB File chunein:</b></label>
        <input type="file" id="epubFile" accept=".epub">
        
        <button id="saveBtn">💾 Translated Text ko .txt File mein Save Karein</button>
    </div>

    <div id="viewer">📚 File upload karein aur load hone ka wait karein...</div>

    <script>
        let book = null;

        document.getElementById('epubFile').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (!file) return;

            const viewer = document.getElementById("viewer");
            viewer.innerHTML = "<p class='loading'>⏳ Puri kitaab extract ho rahi hai... Badi file mein thoda time lagega, please wait!</p>";

            let reader = new FileReader();
            reader.onload = function(event) {
                let bookData = event.target.result;
                book = ePub(bookData);

                // Sare chapters ko extract karke ek page par daalna
                book.loaded.spine.then(async function() {
                    let fullHtml = "";
                    try {
                        for(let i = 0; i < book.spine.length; i++) {
                            let item = book.spine.get(i);
                            await item.load(book.load.bind(book));
                            if(item.document && item.document.body) {
                                // Separator add kiya taaki TXT file me bhi chapter alag dikhein
                                fullHtml += item.document.body.innerHTML + "<div class='separator'>--- CH ---</div>";
                            }
                        }
                        viewer.innerHTML = fullHtml;
                    } catch(err) {
                        viewer.innerHTML = "<p class='loading'>❌ Error: Book extract karne mein dikkat aayi.</p>";
                    }
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // Save as TXT Logic
        document.getElementById('saveBtn').addEventListener('click', function() {
            const viewer = document.getElementById("viewer");
            
            // Check agar file load hi nahi hui hai
            if (viewer.innerText.includes("File upload karein") || viewer.innerText.includes("extract ho rahi hai")) {
                return alert("⚠️ Pehle file ko poori tarah load hone dein!");
            }

            try {
                // 1. Screen par jo text dikh raha hai (translated), usko extract karo
                let textToSave = viewer.innerText;

                // 2. Us text ka ek TXT Blob (file data) banao
                let blob = new Blob([textToSave], { type: "text/plain;charset=utf-8" });

                // 3. Download link generate karo (Background mein)
                let downloadLink = document.createElement("a");
                downloadLink.href = URL.createObjectURL(blob);
                
                // File ka naam current time ke hisaab se hoga
                let fileName = "Translated_Book_" + Math.floor(Date.now() / 1000) + ".txt";
                downloadLink.download = fileName;

                // 4. Link par auto-click karwao (isse download pop-up aayega)
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

            } catch (err) {
                alert("❌ File save karne mein error aaya: " + err.message);
            }
        });
    </script>

</body>
</html>
